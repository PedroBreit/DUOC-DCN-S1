name: Build, Push and Deploy

# El workflow se ejecuta cuando hay push o pull request hacia main.
on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  # Primer job: construye la imagen Docker y la publica en Docker Hub.
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Descarga el codigo del repositorio.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configura Docker Buildx para construir imagenes Docker.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Inicia sesion en Docker Hub usando secrets.
      # Solo se ejecuta cuando el evento es push.
      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # En pull request solo construye la imagen para validar que no tenga errores.
      - name: Build Docker image for validation
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gestion-guias:test

      # En push a main construye y publica la imagen en Docker Hub.
      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/gestion-guias:latest

  # Segundo job: despliega la aplicacion en EC2.
  deploy-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      # Se conecta a EC2 por SSH y ejecuta comandos de despliegue.
      - name: Deploy to EC2 using SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "===================================================="
            echo "INICIO DESPLIEGUE S8 - CLOUD NATIVE"
            echo "===================================================="

            echo "Actualizando paquetes..."
            sudo dnf update -y

            echo "Instalando Docker..."
            sudo dnf install docker -y

            echo "Instalando cliente EFS..."
            sudo dnf install amazon-efs-utils -y || true

            echo "Iniciando Docker..."
            sudo systemctl start docker
            sudo systemctl enable docker

            echo "Creando red Docker para la aplicacion..."
            sudo docker network create guias-net || true

            echo "Creando punto de montaje EFS..."
            sudo mkdir -p /mnt/efs

            echo "Montando EFS si no esta montado..."
            if ! mountpoint -q /mnt/efs; then
              sudo mount -t efs -o tls ${{ secrets.EFS_ID }}:/ /mnt/efs
            fi

            echo "Creando carpeta de guias dentro de EFS..."
            sudo mkdir -p /mnt/efs/guias

            echo "Asignando permisos al directorio de guias..."
            sudo chmod -R 777 /mnt/efs/guias

            echo "Verificando wallet Oracle en EC2..."
            ls -la /home/${{ secrets.EC2_USER }}/oracle/wallet || true

            echo "Descargando imagen RabbitMQ..."
            sudo docker pull rabbitmq:3-management

            echo "Deteniendo contenedor RabbitMQ anterior si existe..."
            sudo docker stop rabbitmq-guias || true
            sudo docker rm rabbitmq-guias || true

            echo "Levantando RabbitMQ en Docker..."
            sudo docker run -d \
              --name rabbitmq-guias \
              --network guias-net \
              -p 5672:5672 \
              -p 15672:15672 \
              -e RABBITMQ_DEFAULT_USER=guias_user \
              -e RABBITMQ_DEFAULT_PASS=guias_pass \
              --restart unless-stopped \
              rabbitmq:3-management

            echo "Esperando inicio de RabbitMQ..."
            sleep 20

            echo "Descargando imagen de la aplicacion desde Docker Hub..."
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/gestion-guias:latest

            echo "Deteniendo contenedor anterior de la aplicacion si existe..."
            sudo docker stop gestion-guias-app || true
            sudo docker rm gestion-guias-app || true

            echo "Levantando nuevo contenedor Spring Boot con RabbitMQ, EFS, S3 y Oracle..."
            sudo docker run -d \
              --name gestion-guias-app \
              --network guias-net \
              -p 8080:8080 \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
              -e AWS_REGION="${{ secrets.AWS_REGION }}" \
              -e S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}" \
              -e RABBITMQ_HOST="rabbitmq-guias" \
              -e RABBITMQ_PORT="5672" \
              -e RABBITMQ_USERNAME="guias_user" \
              -e RABBITMQ_PASSWORD="guias_pass" \
              -e ORACLE_WALLET_PATH="/app/wallet" \
              -e ORACLE_TNS_NAME="${{ secrets.ORACLE_TNS_NAME }}" \
              -e ORACLE_DB_USERNAME="${{ secrets.ORACLE_DB_USERNAME }}" \
              -e ORACLE_DB_PASSWORD="${{ secrets.ORACLE_DB_PASSWORD }}" \
              -v /mnt/efs/guias:/app/storage/guias \
              -v /home/${{ secrets.EC2_USER }}/oracle/wallet:/app/wallet:ro \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/gestion-guias:latest

            echo "Esperando inicio de Spring Boot..."
            sleep 35

            echo "===================================================="
            echo "EVIDENCIA 1 - CONTENEDORES ACTIVOS"
            echo "===================================================="
            sudo docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"

            echo "===================================================="
            echo "EVIDENCIA 2 - RED DOCKER guias-net"
            echo "===================================================="
            sudo docker network inspect guias-net --format '{{json .Containers}}' || true

            echo "===================================================="
            echo "EVIDENCIA 3 - RABBITMQ EN DOCKER"
            echo "===================================================="
            sudo docker exec rabbitmq-guias rabbitmqctl status | grep -E "RabbitMQ version|Node name|Uptime|Listeners" || true

            echo "===================================================="
            echo "EVIDENCIA 4 - COLAS RABBITMQ"
            echo "===================================================="
            sudo docker exec rabbitmq-guias rabbitmqctl list_queues name messages_ready messages_unacknowledged consumers || true

            echo "===================================================="
            echo "EVIDENCIA 5 - EXCHANGES RABBITMQ"
            echo "===================================================="
            sudo docker exec rabbitmq-guias rabbitmqctl list_exchanges name type durable | grep guias || true

            echo "===================================================="
            echo "EVIDENCIA 6 - HEALTH CHECK SPRING BOOT"
            echo "===================================================="
            curl -s http://localhost:8080/actuator/health || true
            echo ""

            echo "===================================================="
            echo "EVIDENCIA 7 - VOLUMEN EFS MONTADO"
            echo "===================================================="
            df -h | grep efs || true
            ls -la /mnt/efs/guias || true

            echo "===================================================="
            echo "EVIDENCIA 8 - WALLET ORACLE MONTADO EN CONTENEDOR"
            echo "===================================================="
            sudo docker exec gestion-guias-app sh -c "ls -la /app/wallet | sed 's/cwallet.sso/cwallet.sso [PRESENTE]/g' | sed 's/ewallet.p12/ewallet.p12 [PRESENTE]/g'" || true

            echo "===================================================="
            echo "EVIDENCIA 9 - VARIABLES IMPORTANTES SIN SECRETOS"
            echo "===================================================="
            sudo docker exec gestion-guias-app sh -c 'echo RABBITMQ_HOST=$RABBITMQ_HOST && echo RABBITMQ_PORT=$RABBITMQ_PORT && echo ORACLE_WALLET_PATH=$ORACLE_WALLET_PATH && echo ORACLE_TNS_NAME=$ORACLE_TNS_NAME && echo AWS_REGION=$AWS_REGION && echo S3_BUCKET_NAME=$S3_BUCKET_NAME' || true

            echo "===================================================="
            echo "EVIDENCIA 10 - LOGS RECIENTES SPRING BOOT"
            echo "===================================================="
            sudo docker logs --tail 100 gestion-guias-app || true

            echo "===================================================="
            echo "FIN DESPLIEGUE S8"
            echo "===================================================="